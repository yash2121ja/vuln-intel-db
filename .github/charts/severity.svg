<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" fill="none">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 700; fill: #1f2937; }
  .label { font-size: 11px; fill: #6b7280; }
  .value { font-size: 11px; font-weight: 600; fill: #374151; }
  .big-number { font-size: 28px; font-weight: 800; fill: #111827; }
  .sub { font-size: 10px; fill: #9ca3af; }
</style>
<rect width="480" height="200" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="20" y="28" class="title">Severity Distribution</text>
<text x="16" y="70" class="label">CRITICAL</text>
<rect x="120" y="52" width="23" height="28" rx="4" fill="#dc2626" opacity="0.85"/>
<text x="151" y="70" class="value">20,474 (8%)</text>
<text x="16" y="108" class="label">HIGH</text>
<rect x="120" y="90" width="81" height="28" rx="4" fill="#ea580c" opacity="0.85"/>
<text x="209" y="108" class="value">69,101 (27%)</text>
<text x="16" y="146" class="label">MEDIUM</text>
<rect x="120" y="128" width="126" height="28" rx="4" fill="#ca8a04" opacity="0.85"/>
<text x="254" y="146" class="value">107,490 (42%)</text>
<text x="16" y="184" class="label">LOW</text>
<rect x="120" y="166" width="68" height="28" rx="4" fill="#2563eb" opacity="0.85"/>
<text x="196" y="184" class="value">58,863 (23%)</text>
</svg>